# Tool configuration for running pytest from this subdirectory.
# Build & lint configuration lives in the root pyproject.toml.

[tool.pytest.ini_options]
testpaths = ["src/tests"]
markers = [
    "integration: mark a test as an integration test.",
]
addopts = ["-m", "not integration"]
filterwarnings = [
    "ignore::DeprecationWarning:defusedxml.*",
    "ignore::pydantic.PydanticDeprecatedSince211",
    "ignore:.*multi-threaded.*fork.*",
]
