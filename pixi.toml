[workspace]
name = "pyiron-glass"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[system-requirements]
macos = "14.0"

[dependencies]
python = "3.13.*"
hatchling = "*"
# Conda-only / need specific builds
lammps = { version = "==2024.08.29", build = "*_openmpi_*" }
pygraphviz = "*"
# Not in any pyproject.toml
jupyter = "*"
# Prefer conda-forge over PyPI for compiled packages
ase = "*"
lammpsparser = "*"
numba = "*"
numpy = "*"
pandas = "*"
pymatgen = "*"
scipy = "*"

# Platform-specific: flux-core not available on osx-*; sovapy not on conda-forge for osx-arm64
[target.linux-64.dependencies]
sovapy = "0.8.3.*"

[target.osx-64.dependencies]
sovapy = "0.8.3.*"

[pypi-dependencies]
amorphouspy = { path = ".", editable = true }

[target.osx-arm64.pypi-dependencies]
sovapy = ">=0.8.3"

[feature.dev.dependencies]
pre-commit = "*"
ruff = ">=0.12.0"
pytest = "*"
pytest-cov = "*"
nbval = "*"
pip-licenses = "*"

[feature.api.dependencies]
executorlib = "*"
pysqa = "*"
sqlalchemy = "*"
uvicorn = "*"
fastapi-mcp = "*"

[feature.api.target.linux-64.dependencies]
flux-core = ">=0.81.0"

[feature.docs.dependencies]
mkdocs-material = "*"
mkdocs-jupyter = "==0.24.8"
mkdocs-include-markdown-plugin = "*"
pymdown-extensions = "*"
mkdocstrings = "*"
mkdocstrings-python = "*"

[feature.docs.pypi-dependencies]
mkdocs-swagger-ui-tag = ">=0.8.0, <0.9"

[environments]
default = { features = ["dev", "docs", "api"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }

[tasks]
test-lib = { cmd = "python -m pytest src/tests --durations=0 --cov=src/amorphouspy --cov-report=xml --cov-report=term", cwd = "amorphouspy" }
test-api = { cmd = "pytest --durations=0 --cov=src/amorphouspy_api --cov-report=xml --cov-report=term", cwd = "amorphouspy_api" }
test-notebooks = { cmd = "pytest --durations=0 --nbval-lax ../notebooks/*ipynb --cov=$(pwd)/src/amorphouspy --cov-report=term --cov-report=xml --cov-append", cwd = "amorphouspy" }
serve = "uvicorn amorphouspy_api.app:app --host 0.0.0.0 --port 8000 --log-level info --backlog 1 --timeout-keep-alive 60"
lint = "ruff check --output-format=github"
format-check = "ruff format --check --diff"
export-openapi = "python docs/export_openapi.py"
docs-build = { cmd = "mkdocs build --strict", depends-on = ["export-openapi"] }
docs-serve = { cmd = "mkdocs serve", depends-on = ["export-openapi"] }
# Ignored packages: igraph/python-igraph (GPL, transitive via sovapy), lammps (GPL),
# matplotlib-inline (BSD-3-Clause, misreported as UNKNOWN by pip-licenses)
license-check = "pip-licenses --partial-match --allow-only='MIT;BSD;Apache;ISC;PSF;Python Software Foundation;MPL;Mozilla;Unlicense;Public Domain;HPND;LGPL' --fail-on='GNU General Public License v3 (GPLv3);GNU General Public License v2 (GPLv2);GNU General Public License (GPL)' -i UNKNOWN amorphouspy amorphouspy-api igraph python-igraph lammps matplotlib-inline --format=plain"
