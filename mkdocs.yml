site_name: amorphouspy
site_description: Workflows for atomistic modeling of oxide glasses
site_author: Achraf Atila

theme:
  name: material
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Google Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - header.autohide

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorial: tutorial.md
  - How-To Guides:
    - Overview: how_to_guides/index.md
    - Meltquench: notebooks/Meltquench.ipynb
    - Meltquench PMMCS: notebooks/Meltquench_PMMCS.ipynb
    - Meltquench BJP: notebooks/Meltquench_BJP.ipynb
    - Meltquench SHIK: notebooks/Meltquench_SHIK.ipynb
    - Structure Analysis: notebooks/StructureAnalysis.ipynb
    - Elastic Properties: notebooks/ElasticProperties.ipynb
    - Viscosity: notebooks/Viscosity.ipynb
    - CTE: notebooks/CTE.ipynb
    - Meltquench + Analysis: notebooks/meltquench_Structure_analysis.ipynb
  - Theory:
    - Overview: theory/index.md
    - Structure generation: theory/structure.md
    - Interatomic Potentials:
        - Overview: theory/potentials/index.md
        - PMMCS (Pedone): theory/potentials/pmmcs.md
        - BJP (Bouhadja): theory/potentials/bjp.md
        - SHIK (Sundararaman): theory/potentials/shik.md
    - Simulation Workflows:
        - Overview: theory/workflows/index.md
        - Melt-Quench: theory/workflows/melt_quench.md
        - Molecular Dynamics: theory/workflows/md.md
        - Elastic Moduli: theory/workflows/elastic.md
        - Viscosity: theory/workflows/viscosity.md
        - CTE: theory/workflows/cte.md
    - Structural Analysis:
        - Overview: theory/analysis/index.md
        - RDF & Coordination: theory/analysis/rdf.md
        - Qn Distribution: theory/analysis/qn.md
        - Bond Angles: theory/analysis/bond_angles.md
        - Ring Statistics: theory/analysis/rings.md
        - Cavity Analysis: theory/analysis/cavities.md
        - CTE Analysis: theory/analysis/cte_analysis.md
  - Developers:
    - Architecture: developers/architecture.md
  - API Reference: api_reference.md

plugins:
  - search
  - mkdocs-jupyter:
      include_requirejs: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.keys
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js
