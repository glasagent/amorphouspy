name: Test PyPI Package

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    # only runs on PRs automatically opened for new releases
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.head_ref, 'chore/version-bump-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-amorphouspy:
    name: Test amorphouspy install & import
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install package (core only)
        run: pip install dist/*.whl
        shell: bash

      - name: Test imports
        run: |
          python -c "
          import amorphouspy
          from amorphouspy import analysis
          from amorphouspy import structure
          from amorphouspy import workflows
          from amorphouspy import potentials
          from amorphouspy import io_utils
          from amorphouspy import neighbors
          print('amorphouspy imports OK')
          "

  test-amorphouspy-api:
    name: Test amorphouspy_api install & import
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install package (with api extra)
        run: pip install "$(ls dist/*.whl)[api]"

      - name: Test imports
        run: |
          python -c "
          import amorphouspy
          import amorphouspy_api
          from amorphouspy_api import app
          from amorphouspy_api import config
          from amorphouspy_api import models
          from amorphouspy_api import routers
          from amorphouspy_api import database
          print('amorphouspy_api imports OK')
          "
