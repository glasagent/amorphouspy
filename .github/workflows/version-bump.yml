name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump-version:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (contains(github.event.pull_request.labels.*.name, 'patch') ||
        contains(github.event.pull_request.labels.*.name, 'minor') ||
        contains(github.event.pull_request.labels.*.name, 'major')))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - uses: prefix-dev/setup-pixi@v0.8.8

    - name: Determine bump type
      id: bump-type
      env:
        IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        DISPATCH_TYPE: ${{ github.event.inputs.bump_type }}
        HAS_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'major') }}
        HAS_MINOR: ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}
      run: |
        if [ "$IS_DISPATCH" = "true" ]; then
          echo "type=$DISPATCH_TYPE" >> $GITHUB_OUTPUT
        elif [ "$HAS_MAJOR" = "true" ]; then
          echo "type=major" >> $GITHUB_OUTPUT
        elif [ "$HAS_MINOR" = "true" ]; then
          echo "type=minor" >> $GITHUB_OUTPUT
        else
          echo "type=patch" >> $GITHUB_OUTPUT
        fi

    - name: Bump version
      run: |
        import re
        import sys

        bump_type = "${{ steps.bump-type.outputs.type }}"
        if bump_type not in ('major', 'minor', 'patch'):
            print(f"Invalid bump type: {bump_type}")
            sys.exit(1)

        print(f"Bump type: {bump_type}")

        # Read current version from pyproject.toml
        with open('pyproject.toml', 'r') as f:
            content = f.read()

        match = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', content)
        if not match:
            print("Could not find version in pyproject.toml")
            sys.exit(1)

        major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
        print(f"Current version: {major}.{minor}.{patch}")

        if bump_type == 'major':
            major += 1
            minor = 0
            patch = 0
        elif bump_type == 'minor':
            minor += 1
            patch = 0
        elif bump_type == 'patch':
            patch += 1

        new_version = f"{major}.{minor}.{patch}"
        print(f"New version: {new_version}")

        # Update pyproject.toml
        new_content = re.sub(
            r'version = "\d+\.\d+\.\d+"',
            f'version = "{new_version}"',
            content
        )

        with open('pyproject.toml', 'w') as f:
            f.write(new_content)

        print("Updated pyproject.toml")

        # Save new version for next step
        with open('new_version.txt', 'w') as f:
            f.write(new_version)

      shell: python

    - name: Update pixi.lock
      run: pixi install

    - name: Create commit, tag, and push
      run: |
        NEW_VERSION=$(cat new_version.txt)

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add pyproject.toml pixi.lock

        git commit -m "chore: bump version to $NEW_VERSION [skip ci]"

        git tag "v$NEW_VERSION"

        git push origin main
        git push origin "v$NEW_VERSION"
