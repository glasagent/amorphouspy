name: Pipeline for repository-level jobs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.12.0"
          args: check --output-format=github
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.12.0"
          args: format --check --diff

  pip_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - name: Pip check
        run: pixi run pip-check
