name: Pipeline for repository-level jobs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # amorphouspy package
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.7"
          src: ./amorphouspy
          args: check --output-format=github
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.7"
          src: ./amorphouspy
          args: format --check --diff

      # amorphouspy_api package
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.7"
          src: ./amorphouspy_api
          args: check --output-format=github
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.7"
          src: ./amorphouspy_api
          args: format --check --diff

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: true
      - name: Check dependency licenses
        run: pixi run license-check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: true
      - name: Type check with ty
        run: pixi run typecheck
