name: Test Documentation Build

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: true
          environments: docs
      - name: Build with strict mode
        run: pixi run -e docs docs-build
