name: "amorphouspy_api: unit & integration tests"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: true
      - name: Run pytest test suite
        run: pixi run test-api

      - name: Run integration test
        run: |
          cat > test.sh << 'EOF'
          #!/bin/bash
          uvicorn amorphouspy_api.app:app --port 8002 &
          pytest -m integration -s \
            --durations=0 \
            --cov=src/amorphouspy_api \
            --cov-report=xml \
            --cov-report=term \
            --cov-append
          EOF
          chmod +x test.sh
          pixi run -- flux start ./test.sh
        working-directory: amorphouspy_api
        env:
          AMORPHOUSPY_INTEGRATION: "1"
          EXECUTOR_TYPE: "flux"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: amorphouspy_api/coverage.xml
          flags: api
          fail_ci_if_error: false
