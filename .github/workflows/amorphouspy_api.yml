name: "amorphouspy_api: unit & integration tests"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          locked: true
      - name: Run pytest test suite
        run: pixi run test-api

      - name: Run integration test
        run: |
          cat > test.sh << 'EOF'
          #!/bin/bash
          cat > .coveragerc << COVERAGERC
          [run]
          source = src/amorphouspy_api
          parallel = true
          data_file = $PWD/.coverage
          COVERAGERC

          coverage run --rcfile=.coveragerc \
            -m uvicorn amorphouspy_api.app:app --port 8002 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8002/ > /dev/null 2>&1 && echo "Server ready after ${i}s" && break
            sleep 1
          done
          pytest -m integration -s --durations=0 \
            --cov=src/amorphouspy_api --cov-report= --cov-append
          TEST_EXIT=$?
          kill -INT $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          coverage combine --rcfile=.coveragerc
          coverage xml --rcfile=.coveragerc
          coverage report --rcfile=.coveragerc --show-missing
          exit $TEST_EXIT
          EOF
          chmod +x test.sh
          pixi run -- flux start ./test.sh
        working-directory: amorphouspy_api
        env:
          AMORPHOUSPY_INTEGRATION: "1"
          EXECUTOR_TYPE: "flux"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: amorphouspy_api/coverage.xml
          flags: api
          fail_ci_if_error: false
