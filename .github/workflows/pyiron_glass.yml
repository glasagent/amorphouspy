name: jobs for pyiron_glass module

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Conda config
      run: echo -e "channels:\n  - conda-forge\n" > .condarc
    - name: Setup Mambaforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: "3.13"
        miniforge-version: latest
        condarc-file: .condarc
        environment-file: environment.yml
    - name: Install dependencies
      working-directory: pyiron_glass
      shell: bash -l {0}
      run: |
        pip install --no-deps --no-build-isolation -e .
        pip install -r requirements-dev.txt
    - name: Run pytest test suite
      shell: bash -l {0}
      working-directory: pyiron_glass
      run: |
        python -m pytest src/tests --cov=src/pyiron_glass --cov-report=xml --cov-report=term

    - name: Test notebooks
      shell: bash -l {0}
      working-directory: pyiron_glass
      run: |
        # absolute path in --cov is necessary here, otherwise it gets confused
        pytest --nbval-lax ../notebooks/*ipynb --cov=$(pwd)/src/pyiron_glass --cov-report=term --cov-report=xml --cov-append

    - name: Pytest coverage comment
      uses: MishaKav/pytest-coverage-comment@main
      with:
        pytest-xml-coverage-path: pyiron_glass/coverage.xml


